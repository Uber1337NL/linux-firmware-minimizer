---
# drivers.yaml - List of firmware modules to keep

drivers:
  # Intel WiFi drivers
  - 'iwlwifi-*'

  # Realtek network drivers
  - 'rtl_nic/*'
  - 'rtw88/*'
  - 'rtw89/*'

  # Intel graphics
  - 'i915/*'

  # AMD graphics
  - 'amdgpu/*'
  - 'radeon/*'

  # NVIDIA graphics (if user has NVIDIA hardware)
  - 'nvidia/*'

  # Bluetooth
  - 'intel/ibt-*'
  - 'rtl_bt/*'

  # Audio
  - 'intel/sof/*'

  # USB devices
  - '*.ucode'
